name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deps:
    name: reka-ui single version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finapp/app check:deps

  e2e-prod:
    name: reka-ui inject (prod build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v6
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @finapp/app exec playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @finapp/app exec playwright install-deps chromium
      # The demo smoke runs without a backend, but the build still needs a valid
      # supabaseUrl or createClient() throws and the login page never mounts.
      - run: pnpm --filter @finapp/app test:e2e:prod
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: e2e-dummy-anon-key
          VITE_POWERSYNC_URL: https://example.powersync.journeyapps.com
